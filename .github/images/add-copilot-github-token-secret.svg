<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" aria-labelledby="title desc" role="img"><title id="title">COPILOT_GITHUB_TOKEN secret placeholder</title><desc id="desc">Placeholder showing a new repository secret form with COPILOT_GITHUB_TOKEN as the secret name and no token value.</desc><rect width="900" height="420" fill="#f6f8fa"/><rect width="740" height="340" x="80" y="40" fill="#fff" stroke="#d0d7de" rx="12"/><text x="120" y="88" fill="#24292f" font-family="Arial, sans-serif" font-size="24" font-weight="700">New repository secret</text><text x="120" y="136" fill="#24292f" font-family="Arial, sans-serif" font-size="15" font-weight="700">Name</text><rect width="520" height="42" x="120" y="152" fill="#fff" stroke="#8c959f" rx="6"/><text x="136" y="180" fill="#24292f" font-family="Arial, sans-serif" font-size="16">COPILOT_GITHUB_TOKEN</text><text x="120" y="232" fill="#24292f" font-family="Arial, sans-serif" font-size="15" font-weight="700">Secret</text><rect width="640" height="72" x="120" y="248" fill="#fff" stroke="#8c959f" rx="6"/><text x="136" y="290" fill="#6e7781" font-family="Arial, sans-serif" font-size="16">Paste token value here in the real UI. Do not show it in screenshots.</text><rect width="120" height="40" x="120" y="340" fill="#2da44e" rx="6"/><text x="145" y="365" fill="#fff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Add secret</text></svg>